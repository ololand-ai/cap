name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - name: Run tests
        run: uv run --python ${{ matrix.python }} --isolated pytest -q

  # Single required status check for branch protection — green only if the whole
  # matrix passed (avoids depending on per-matrix check names).
  ci:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - run: echo "all matrix jobs passed"
